
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaadu ki kaat - Roohani Ilaaj & Shifa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Cinzel', 'serif'],
              sans: ['Lato', 'sans-serif'],
            },
            colors: {
              spirit: {
                50: '#eef6ff',
                100: '#dcecfe',
                200: '#bdddfc',
                300: '#a0cefb',
                400: '#88bdf2',
                500: '#7ba5ca',
                600: '#6a89a7',
                700: '#536b86',
                800: '#45596f',
                900: '#384959',
              },
              accent: {
                50: '#eef6ff',
                100: '#dcecfe',
                200: '#bdddfc',
                300: '#a0cefb',
                400: '#88bdf2',
                500: '#6a89a7',
                600: '#536b86', 
              }
            },
            animation: {
              'fade-in': 'fadeIn 1s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'fade-in-down': 'fadeInDown 0.8s ease-out forwards',
              'fade-in-left': 'fadeInLeft 0.8s ease-out forwards',
              'fade-in-right': 'fadeInRight 0.8s ease-out forwards',
              'zoom-in': 'zoomIn 0.8s ease-out forwards',
              'zoom-in-up': 'zoomInUp 0.8s ease-out forwards',
              'bounce-in': 'bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards',
              'slide-in-left': 'slideInLeft 0.8s ease-out forwards',
              'slide-in-right': 'slideInRight 0.8s ease-out forwards',
              'flip-in-x': 'flipInX 0.8s ease-out forwards',
              'flip-in-y': 'flipInY 0.8s ease-out forwards',
              'rotate-in': 'rotateIn 0.8s ease-out forwards',
              'swing': 'swing 1s ease-out forwards',
              'bounce-slow': 'bounce 3s infinite',
              'marquee': 'marquee 25s linear infinite',
              'typing': 'typing 3.5s steps(40, end), blink .75s step-end infinite',
              'typing-infinite': 'typing-infinite 5s steps(40, end) infinite, blink .75s step-end infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInLeft: {
                '0%': { opacity: '0', transform: 'translateX(-20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              fadeInRight: {
                '0%': { opacity: '0', transform: 'translateX(20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              zoomIn: {
                '0%': { opacity: '0', transform: 'scale(0.9)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              zoomInUp: {
                '0%': { opacity: '0', transform: 'scale(0.9) translateY(20px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              },
              bounceIn: {
                '0%': { opacity: '0', transform: 'scale(0.3)' },
                '50%': { opacity: '1', transform: 'scale(1.05)' },
                '70%': { transform: 'scale(0.9)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              slideInLeft: {
                '0%': { opacity: '0', transform: 'translateX(-100%)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              slideInRight: {
                '0%': { opacity: '0', transform: 'translateX(100%)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              flipInX: {
                '0%': { opacity: '0', transform: 'perspective(400px) rotateX(90deg)' },
                '100%': { opacity: '1', transform: 'perspective(400px) rotateX(0deg)' },
              },
              flipInY: {
                '0%': { opacity: '0', transform: 'perspective(400px) rotateY(90deg)' },
                '100%': { opacity: '1', transform: 'perspective(400px) rotateY(0deg)' },
              },
              rotateIn: {
                '0%': { opacity: '0', transform: 'rotate(-200deg)' },
                '100%': { opacity: '1', transform: 'rotate(0)' },
              },
              swing: {
                '20%': { transform: 'rotate(15deg)' },
                '40%': { transform: 'rotate(-10deg)' },
                '60%': { transform: 'rotate(5deg)' },
                '80%': { transform: 'rotate(-5deg)' },
                '100%': { transform: 'rotate(0deg)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              typing: {
                '0%': { width: '0' },
                '100%': { width: '100%' },
              },
              'typing-infinite': {
                '0%, 15%': { width: '0' },
                '40%, 85%': { width: '100%' },
                '100%': { width: '0' },
              },
              blink: {
                'from, to': { borderColor: 'transparent' },
                '50%': { borderColor: '#6a89a7' }, // accent-500 color
              }
            }
          }
        }
      }
    </script>
    <style>
      html { scroll-behavior: smooth; }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #6a89a7;
        border-radius: 10px;
      }
      .pause-on-hover:hover {
        animation-play-state: paused;
      }
      .mask-edges {
        mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      }
      
      /* Hide Google Translate completely, we will use custom button */
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      body { top: 0px !important; }
      #google_translate_element { display: none !important; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.90.1",
    "@emailjs/browser": "https://esm.sh/@emailjs/browser@^4.4.1",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,ur',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="root"></div>
    <!-- Vite entry point -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
